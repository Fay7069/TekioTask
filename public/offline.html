<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline – TekioTask</title>
    <link rel="stylesheet" href="/css/tekiotask.css">
</head>
<body class="login-body">

    <div class="login-brand">
        <div class="brand-icon">✓</div>
        <span class="brand-name">TekioTask</span>
    </div>

    <div class="login-card" style="text-align:center;">
        <div style="font-size:56px; margin-bottom:16px;">📶</div>
        <h2 style="margin-bottom:8px;">You're offline</h2>
        <p style="color:#6b7280; margin-bottom:24px;">
            No internet connection right now. Don't worry —
            your active task and timer still work!
        </p>
        <a href="/student/routine" class="btn btn-primary btn-full btn-lg" style="margin-bottom:12px;">
            Continue My Task
        </a>
        <button onclick="window.location.reload()" class="btn btn-outline btn-full">
            Try Again
        </button>
    </div>

</body>
</html>
